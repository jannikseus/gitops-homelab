deployment:
  replicas: 2

ingressClass:
  enabled: true
  isDefaultClass: true
  name: traefik

providers:
  kubernetesIngress:
    enabled: true
    ingressClass: traefik

service:
  type: LoadBalancer

ports:
  web:
    redirections:
      entryPoint:
        to: websecure
        scheme: https
        permanent: true
  websecure:
    tls:
      enabled: true

logs:
  general:
    level: INFO

ingressRoute:
  dashboard:
    enabled: false

additionalArguments:
  - "--api.dashboard=true"