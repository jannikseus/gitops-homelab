apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  source:
    repoURL: https://github.com/jannikseus/portfolio-website.git
    targetRevision: main
    path: apps/prod/portfolio
  syncPolicy:
    automated:
      prune: true
      selfHeal: true