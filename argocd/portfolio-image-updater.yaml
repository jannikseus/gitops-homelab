apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: portfolio-updater
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: portfolio-prod
      useAnnotations: false
      commonUpdateSettings:
        updateStrategy: semver
        allowTags: regexp:^v[0-9]+\.[0-9]+\.[0-9]+$
      images:
        - alias: portfolio
          imageName: ghcr.io/jannikseus/portfolio
  writeBackConfig:
    method: git
    gitConfig:
      branch: main
      writeBackTarget: kustomization

